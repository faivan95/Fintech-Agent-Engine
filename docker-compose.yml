services:
  # The Local LLM Engine
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-engine
    volumes:
      - ./ollama_data:/root/.ollama  # Persist downloaded models
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Your FinTech Agent Application
  agent-app:
    build: .
    container_name: fintech-agents
    volumes:
      - ./app:/app       # Live code reloading
      - ./data:/app/data # Persistent vector data
    env_file:
      - .env
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434 # Point LangChain to the Ollama container
    ports:
      - "8501:8501" # Exposes the Streamlit web server
    

  # PostgreSQL Database with pgvector extension
  postgres-db:
    image: pgvector/pgvector:pg16
    container_name: fintech-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  